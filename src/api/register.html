<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Get Started — SBOMix</title>
<style>
  :root {
    --bg:      #0d1117;
    --surface: #161b22;
    --border:  #30363d;
    --text:    #e6edf3;
    --muted:   #8b949e;
    --accent:  #3fb950;
    --red:     #f85149;
    --blue:    #58a6ff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 40px; width: 100%; max-width: 440px; }
  .logo { font-weight: 700; font-size: 18px; letter-spacing: -0.3px; margin-bottom: 24px; }
  .logo span { color: var(--accent); }
  h1  { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
  p   { color: var(--muted); line-height: 1.6; margin-bottom: 24px; }

  label { display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); margin-bottom: 6px; }
  .field { margin-bottom: 16px; }
  input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: 8px; font-size: 14px; outline: none; transition: border-color .15s; }
  input:focus { border-color: var(--accent); }
  input::placeholder { color: var(--muted); }

  .btn { width: 100%; background: var(--accent); color: #000; font-weight: 700; border: none; padding: 11px; border-radius: 8px; cursor: pointer; font-size: 14px; margin-top: 4px; transition: opacity .15s; }
  .btn:hover { opacity: .88; }
  .btn:disabled { opacity: .5; cursor: default; }

  .error   { color: var(--red);    font-size: 13px; margin-top: 12px; display: none; }
  .success { display: none; text-align: center; padding: 16px 0; }
  .success-icon { font-size: 36px; margin-bottom: 12px; }
  .success h2 { font-size: 18px; margin-bottom: 8px; }
  .success p  { font-size: 13px; color: var(--muted); margin: 0; }

  .footer { margin-top: 20px; font-size: 12px; color: var(--muted); text-align: center; }
  .footer a { color: var(--blue); text-decoration: none; }
  .footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">SBOMix</div>

  <div id="form-view">
    <h1>Get started</h1>
    <p>No credit card required.</p>

    <a href="/auth/github" style="display:flex;align-items:center;justify-content:center;gap:10px;width:100%;background:#f6f8fa;color:#1f2328;padding:11px;border-radius:8px;font-weight:600;font-size:14px;text-decoration:none;border:1px solid #d0d7de;margin-bottom:16px;transition:background .15s" onmouseover="this.style.background='#e9ebec'" onmouseout="this.style.background='#f6f8fa'">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="#1f2328" aria-hidden="true"><path d="M12 0C5.37 0 0 5.373 0 12c0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.387-1.333-1.756-1.333-1.756-1.09-.744.084-.73.084-.73 1.205.085 1.84 1.237 1.84 1.237 1.07 1.834 2.807 1.304 3.492.997.108-.775.418-1.305.762-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.468-2.38 1.235-3.22-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.3 1.23A11.51 11.51 0 0112 5.803c1.02.005 2.047.137 3.006.403 2.29-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.91 1.235 3.22 0 4.61-2.807 5.625-5.48 5.92.43.372.814 1.103.814 2.222 0 1.606-.015 2.9-.015 3.293 0 .322.216.694.825.576C20.565 21.796 24 17.3 24 12c0-6.627-5.373-12-12-12z"/></svg>
      Sign up with GitHub
    </a>

    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;color:#484f58;font-size:12px">
      <span style="flex:1;height:1px;background:var(--border)"></span>or<span style="flex:1;height:1px;background:var(--border)"></span>
    </div>

    <div class="field">
      <label for="org-input">Organisation / Project name</label>
      <input type="text" id="org-input" placeholder="acme-corp" maxlength="100" autocomplete="organization">
    </div>
    <div class="field">
      <label for="email-input">Email address</label>
      <input type="email" id="email-input" placeholder="you@example.com" autocomplete="email">
    </div>

    <button class="btn" id="submit-btn">Get API key</button>
    <div class="error" id="error-msg"></div>
  </div>

  <div class="success" id="success-view">
    <div class="success-icon">📬</div>
    <h2>Check your email</h2>
    <p>We've sent a verification link to <strong id="sent-to"></strong>.<br>Click the link to activate your account and receive your API key.</p>
  </div>
</div>

<div class="footer">
  Already have a key? <a href="/dashboard">Open dashboard</a>
  &nbsp;·&nbsp; <a href="/recover">Lost your key?</a>
  &nbsp;·&nbsp; <a href="/docs">API docs</a>
  &nbsp;·&nbsp; <a href="/terms">Terms</a>
  &nbsp;·&nbsp; <a href="/privacy">Privacy</a>
</div>

<script>
document.getElementById('submit-btn').addEventListener('click', submit);
document.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });

async function submit() {
  const orgName = document.getElementById('org-input').value.trim();
  const email   = document.getElementById('email-input').value.trim();
  const errEl   = document.getElementById('error-msg');
  const btn     = document.getElementById('submit-btn');

  errEl.style.display = 'none';

  if (!orgName) { showError('Please enter your org or project name.'); return; }
  if (!email)   { showError('Please enter your email address.'); return; }

  btn.disabled = true;
  btn.textContent = 'Sending…';

  try {
    const r = await fetch('/api/v1/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ orgName, email }),
    });
    const data = await r.json();
    if (!r.ok) { showError(data.error || 'Something went wrong — try again.'); return; }

    document.getElementById('sent-to').textContent = email;
    document.getElementById('form-view').style.display   = 'none';
    document.getElementById('success-view').style.display = 'block';
  } catch {
    showError('Network error — check your connection and try again.');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Get API key';
  }
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
}
</script>
</body>
</html>
